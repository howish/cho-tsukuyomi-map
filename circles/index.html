<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サークル一覧 — yachi8000.app</title>
<meta name="description" content="同人即売会 fan guide で扱った全サークル一覧。X handle ごとに集約、 横断 event 出展履歴を表示。">
<link rel="stylesheet" href="../hub.css?v=1780575686">
<link rel="stylesheet" href="circles.css?v=1780575686">
<link rel="icon" type="image/svg+xml" href="../cho-tsukuyomi-2026-05/icon.svg">
<meta name="theme-color" content="#4a3a5c">
</head>
<body>
<header class="hub-header">
  <h1>🌙 サークル一覧</h1>
  <p class="hub-subtitle">
    <a href="../" class="hub-back-link">← ハブに戻る</a>
    ／ 全 event 横断のサークル索引
    ／ <a id="mode-toggle" href="?mode=edit" class="hub-back-link">🔧 Edit mode</a>
  </p>
</header>

<!-- Edit-mode pending panel (hidden in read mode; circles-edit.js shows it on bootstrap) -->
<aside class="review-pending-panel" id="review-pending-panel" hidden>
  <div class="pending-header">
    <h3>📤 保留中の決定 (<span id="pending-count">0</span>)</h3>
    <div class="pending-actions">
      <button id="submit-github" class="primary">GitHub Issue で送信</button>
      <button id="submit-download">decisions.json を DL</button>
      <button id="pending-clear" class="ghost">全クリア</button>
    </div>
  </div>
  <details class="pending-detail">
    <summary>詳細を見る</summary>
    <ol class="pending-list" id="pending-list"></ol>
  </details>
  <p class="pending-hint" id="pending-hint"></p>
</aside>

<!-- Read-mode container (default) -->
<main class="hub-main" id="read-mode-main">
  <section class="circles-controls">
    <div class="circles-stats" id="circles-stats">読み込み中...</div>
    <div class="circles-search-wrap">
      <input type="search" id="circles-search" placeholder="サークル名 / 作家 / X handle で検索..."
             class="circles-search" autocomplete="off">
      <button type="button" id="circles-search-clear" hidden aria-label="検索クリア">×</button>
    </div>
    <div class="circles-filter-row" id="filter-row-base">
      <span class="filter-row-label">📋</span>
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="multi">複数 event 出展</button>
      <button class="filter-btn" data-filter="no-handle">SNS handle なし</button>
    </div>
    <div class="circles-filter-row" id="filter-row-events">
      <span class="filter-row-label">📅</span>
      <!-- event filter buttons injected at runtime -->
    </div>
    <div class="circles-filter-row" id="filter-row-platforms">
      <span class="filter-row-label">🔗</span>
      <!-- platform filter buttons injected at runtime -->
    </div>
  </section>

  <section class="circles-list" id="circles-list">
    <p class="loading">読み込み中...</p>
  </section>
</main>

<!-- Edit-mode container (revealed by circles-edit.js when ?mode=edit) -->
<main class="review-main" id="edit-mode-main" hidden>
  <aside class="review-sidebar">
    <h3>Filters</h3>

    <div class="filter-block">
      <label class="filter-label">表示</label>
      <div class="filter-row">
        <button class="filter-btn active" data-status="unresolved">未確定のみ</button>
        <button class="filter-btn" data-status="all">全 author</button>
      </div>
    </div>

    <div class="filter-block">
      <label class="filter-label">Event</label>
      <div class="filter-row" id="filter-event"></div>
    </div>

    <div class="filter-block">
      <label class="filter-label">Platform</label>
      <div class="filter-row" id="filter-platform"></div>
    </div>

    <div class="filter-block">
      <label class="filter-label">検索</label>
      <input type="search" id="review-search" placeholder="circle / handle で検索..." class="review-search">
    </div>

    <div class="review-stats" id="review-stats">読み込み中...</div>
  </aside>

  <section class="review-list" id="review-list">
    <p class="loading">読み込み中...</p>
  </section>
</main>

<footer class="hub-footer">
  <p>
    Built by <a href="https://github.com/howish" target="_blank" rel="noopener">@howish</a>
    ／ <a href="https://github.com/howish/cho-tsukuyomi-map" target="_blank" rel="noopener">GitHub</a>
    ／ サークル情報は各 event guide から runtime 集約
  </p>
</footer>

<script src="../profile-patterns.js?v=1780575686"></script>
<script src="../platform-icons.js?v=1780575686"></script>
<script src="../circles.js?v=1780575686"></script>
<script src="circles.js?v=1780575686"></script>
<!-- circles-edit.js + ws-candidates.js are loaded dynamically by circles.js when ?mode=edit -->
</body>
</html>
