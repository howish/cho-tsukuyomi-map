<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booth Coord Tool · cho-tsukuyomi-map (IF7)</title>
  <style>
    :root {
      --bg: #faf7f2;
      --panel: #fff;
      --border: #d8d0c2;
      --text: #2a2a2a;
      --muted: #8a8276;
      --accent: #c47b00;
      --accent-bg: #ffd84a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; }
    .layout { display: grid; grid-template-columns: 360px 1fr; height: 100vh; }
    .sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 1rem; overflow-y: auto; }
    .map-wrap { position: relative; overflow: auto; background: #2a2a2a; padding: 1rem; touch-action: pan-x pan-y; }
    .map-inner { position: relative; display: inline-block; width: 100%; transition: width 0.12s; }
    .map-inner img { display: block; width: 100%; -webkit-user-drag: none; user-select: none; }
    .map-inner svg { position: absolute; inset: 0; width: 100%; height: 100%; cursor: crosshair; }
    /* Floating zoom toolbar — fixed within .map-wrap visible area so it
       stays accessible when scrolled away from the top-left corner. */
    .zoom-toolbar {
      position: fixed; top: 1rem; right: 1rem;
      display: flex; gap: 0.4rem; align-items: center;
      background: rgba(0,0,0,0.78); padding: 0.4rem 0.6rem;
      border-radius: 6px;
      width: fit-content; color: #fff; font-size: 0.85rem;
      z-index: 20;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .zoom-toolbar button {
      background: #fff; border: 1px solid var(--border); border-radius: 4px;
      width: 2rem; height: 2rem; cursor: pointer; font-weight: 600; font-size: 1.05rem;
      padding: 0;
    }
    .zoom-toolbar .zoom-display { min-width: 3.5rem; text-align: center; font-variant-numeric: tabular-nums; }
    .zoom-toolbar .hint { font-size: 0.72rem; opacity: 0.75; margin-left: 0.4rem; }
    h2 { font-size: 1rem; margin: 0 0 0.5rem; }
    h3 { font-size: 0.85rem; margin: 1rem 0 0.4rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    label { display: block; font-size: 0.78rem; color: var(--muted); margin: 0.4rem 0 0.15rem; }
    input, select { width: 100%; padding: 0.4rem; border: 1px solid var(--border); border-radius: 4px; font-family: inherit; font-size: 0.85rem; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    button { padding: 0.45rem 0.8rem; border: 1px solid var(--border); background: #fff; border-radius: 5px; cursor: pointer; font-size: 0.85rem; font-family: inherit; }
    button.primary { background: var(--accent-bg); border-color: var(--accent); font-weight: 600; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { padding: 0.5rem 0.6rem; background: #fff7d6; border: 1px solid var(--accent); border-radius: 5px; font-size: 0.8rem; margin: 0.5rem 0; }
    .status.idle { background: #f0f0f0; border-color: var(--border); color: var(--muted); }
    .bands-list { font-size: 0.78rem; }
    .bands-list .band { padding: 0.35rem 0.5rem; background: #fcfaf6; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 0.3rem; display: flex; justify-content: space-between; align-items: center; gap: 0.3rem; }
    .bands-list .band button { padding: 0.15rem 0.4rem; font-size: 0.72rem; }
    textarea { width: 100%; min-height: 200px; font-family: ui-monospace, monospace; font-size: 0.7rem; padding: 0.4rem; border: 1px solid var(--border); border-radius: 4px; resize: vertical; }
    .stat { font-size: 0.78rem; color: var(--muted); margin-top: 0.3rem; }
    /* SVG overlay styles */
    svg rect.preview { fill: var(--accent-bg); fill-opacity: 0.35; stroke: var(--accent); stroke-width: 1; stroke-dasharray: 3,2; vector-effect: non-scaling-stroke; }
    svg rect.placed { fill: #93c47d; fill-opacity: 0.28; stroke: #38761d; stroke-width: 0.5; vector-effect: non-scaling-stroke; }
    /* Upstream coords already in coords.js — different colour so howish can
       see at a glance which cells are already mapped and which are still pending. */
    svg rect.upstream { fill: #5b9bd5; fill-opacity: 0.18; stroke: #1f4e79; stroke-width: 0.4; stroke-dasharray: 1.2,0.8; vector-effect: non-scaling-stroke; }
    svg rect.corner-marker { fill: red; }
    svg rect.corner-marker-tl { fill: #1565c0; }
    svg rect.corner-marker-br { fill: #c62828; }
    /* font-size is overridden per-rect in renderAll() so labels scale with cell */
    svg text.placed-label { font-family: monospace; fill: #38761d; pointer-events: none; }
    svg text.upstream-label { font-family: monospace; fill: #1f4e79; opacity: 0.7; pointer-events: none; }
    .toggle-row { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.4rem; }
    .toggle-row label { display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.78rem; color: var(--text); margin: 0; cursor: pointer; }
    .mode-radio { display: flex; gap: 0.6rem; margin-top: 0.4rem; font-size: 0.82rem; }
    .mode-radio label { display: inline-flex; align-items: center; gap: 0.25rem; margin: 0; cursor: pointer; }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <h2>🗺 Coord tool — IF7</h2>
    <p class="stat" id="counts">読込中…</p>

    <h3>表示オプション</h3>
    <div class="toggle-row">
      <label><input type="checkbox" id="show-upstream" checked> 既存 coords.js を表示 (青)</label>
    </div>

    <h3>1. 帯を定義</h3>
    <div class="row">
      <div>
        <label>Row</label>
        <select id="row-select"></select>
      </div>
      <div>
        <label>方向</label>
        <select id="direction">
          <option value="lr">左→右 (1 が左)</option>
          <option value="rl" selected>右→左 (1 が右)</option>
          <option value="tb">上→下 (1 が上)</option>
          <option value="bt">下→上 (1 が下)</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div><label>開始番号</label><input type="number" id="start-num" min="1" max="99" value="1"></div>
      <div><label>終了番号</label><input type="number" id="end-num" min="1" max="99" value="22"></div>
    </div>
    <div class="mode-radio">
      <label><input type="radio" name="input-mode" value="alternate" checked> 交互 (TL → BR 自動)</label>
      <label><input type="radio" name="input-mode" value="refine"> 再クリック可 (TL → BR 手動 commit)</label>
    </div>
    <button id="begin-band" class="primary" style="width:100%; margin-top:0.5rem;">この帯の 2 隅をクリック開始</button>
    <button id="refine-tl-start" style="width:100%; margin-top:0.3rem; display:none;">TL refine 開始 (何度でも click 可)</button>
    <button id="refine-br-start" style="width:100%; margin-top:0.3rem; display:none;">BR refine 開始 (何度でも click 可)</button>
    <button id="refine-commit" class="primary" style="width:100%; margin-top:0.3rem; display:none;">band を commit</button>

    <h3>2. クリック手順</h3>
    <div class="status idle" id="status">アイドル — 上の "クリック開始" を押してから map をクリック</div>

    <h3>3. 既定義の帯 (<span id="band-count">0</span>)</h3>
    <div class="bands-list" id="bands-list"></div>

    <h3>4. Export</h3>
    <p class="stat">合計 booth coords: <span id="coord-count">0</span></p>
    <button id="copy-json" class="primary" style="width:100%;">📋 coords.js content を copy</button>
    <button id="dl-json" style="width:100%; margin-top:0.4rem;">⬇ coords.js を download</button>
    <button id="reset" style="width:100%; margin-top:0.4rem; background:#fff0f0; border-color:#c0392b; color:#c0392b;">⟲ 全消去</button>
    <textarea id="json-out" style="margin-top:0.5rem;" readonly></textarea>
  </aside>

  <div class="map-wrap" id="map-wrap">
    <div class="zoom-toolbar">
      <button type="button" id="zoom-out" title="ズームアウト (Ctrl+Wheel ↓)">−</button>
      <span class="zoom-display" id="zoom-display">100%</span>
      <button type="button" id="zoom-in" title="ズームイン (Ctrl+Wheel ↑)">+</button>
      <button type="button" id="zoom-fit" title="幅にフィット">⤢</button>
      <span class="hint">Ctrl + ホイールでもズーム</span>
    </div>
    <div class="map-inner" id="map-inner">
      <img id="map-img" src="map.jpg" alt="map">
      <svg id="overlay" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="coords.js"></script>
<script>
/**
 * Booth coord tool — band-mode input.
 *
 * Flow:
 *  - User picks a row letter (S/J/T/U/Y), start+end numbers, direction.
 *  - Clicks "begin band" → next two map clicks define top-left then bottom-right of the band.
 *  - Tool auto-distributes N cells evenly along the chosen direction,
 *    assigns to "<row>-<padded N>", merges into global coords table.
 *  - User repeats for each band. Live JSON output ready to paste.
 *
 * Persisted to localStorage so reloads don't lose work.
 */

const STORAGE_KEY = 'cho-tsukuyomi-coord-tool';
const overlay = document.getElementById('overlay');
const statusEl = document.getElementById('status');
const bandsListEl = document.getElementById('bands-list');
const jsonOut = document.getElementById('json-out');
const counts = document.getElementById('counts');
const bandCountEl = document.getElementById('band-count');
const coordCountEl = document.getElementById('coord-count');

let state = loadState();  // { coords: {<id>: {x,y,w,h}}, bands: [{key,row,start,end,dir,r}], }
let mode = 'idle';        // 'idle' | 'waiting1' | 'waiting2' | 'refine-tl' | 'refine-br'
let pendingCorner1 = null;
let pendingBand = null;   // {row, start, end, dir} captured when "begin band" pressed
// Refinement-mode pendings — each click overwrites so howish can re-click
// to fine-tune the same anchor until it lines up exactly.
let refinedTL = null;
let refinedBR = null;

// Upstream coords loaded from coords.js (snapshot at page load).
const upstreamCoords = (window.BOOTH_COORDS && Object.keys(window.BOOTH_COORDS).length) ? { ...window.BOOTH_COORDS } : {};
let showUpstream = true;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { coords: {}, bands: [] };
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

// Populate row-select from BOOTHS data
function init() {
  const rows = new Set();
  for (const b of (window.BOOTHS || [])) {
    const m = b.booth_id.match(/^([A-Z])-/);
    if (m) rows.add(m[1]);
  }
  const sel = document.getElementById('row-select');
  [...rows].sort().forEach(r => {
    const opt = document.createElement('option');
    opt.value = r; opt.textContent = r;
    sel.appendChild(opt);
  });
  counts.textContent = `合計 ${(window.BOOTHS || []).length} booths · rows: ${[...rows].sort().join(', ')}`;
  renderAll();
}

function readPendingBand() {
  const row = document.getElementById('row-select').value;
  const start = parseInt(document.getElementById('start-num').value, 10);
  const end = parseInt(document.getElementById('end-num').value, 10);
  const dir = document.getElementById('direction').value;
  if (!row || isNaN(start) || isNaN(end) || start > end) {
    setStatus('開始/終了番号が不正', 'warn'); return null;
  }
  return { row, start, end, dir };
}

function syncModeButtons() {
  const inputMode = document.querySelector('input[name="input-mode"]:checked').value;
  document.getElementById('begin-band').style.display = inputMode === 'alternate' ? '' : 'none';
  document.getElementById('refine-tl-start').style.display = inputMode === 'refine' ? '' : 'none';
  document.getElementById('refine-br-start').style.display = inputMode === 'refine' ? '' : 'none';
  document.getElementById('refine-commit').style.display = inputMode === 'refine' ? '' : 'none';
}
document.querySelectorAll('input[name="input-mode"]').forEach(r => {
  r.addEventListener('change', () => {
    syncModeButtons();
    // Reset any pending state when switching mode
    mode = 'idle'; pendingCorner1 = null; refinedTL = null; refinedBR = null;
    setStatus('モード変更: 上から開始ボタンを押す', 'idle');
    renderAll();
  });
});
syncModeButtons();

document.getElementById('begin-band').addEventListener('click', () => {
  const pb = readPendingBand(); if (!pb) return;
  pendingBand = pb;
  pendingCorner1 = null;
  mode = 'waiting1';
  setStatus(`✦ ${pb.row}-${pad(pb.start)} の左上 (= 1 番) をクリックしてください`, 'wait');
});

// Refinement mode — each click in TL/BR phase overwrites the same anchor
// so howish can re-click until it's pixel-perfect, then explicit commit
// writes the band (or single cell when start == end).
document.getElementById('refine-tl-start').addEventListener('click', () => {
  const pb = readPendingBand(); if (!pb) return;
  pendingBand = pb;
  refinedTL = null;
  mode = 'refine-tl';
  setStatus(`📍 ${pb.row}-${pad(pb.start)} の TL をクリック (再クリックで上書き)`, 'wait');
  renderAll();
});

document.getElementById('refine-br-start').addEventListener('click', () => {
  if (!pendingBand) { setStatus('まず TL refine 開始 → TL クリック', 'warn'); return; }
  if (!refinedTL) { setStatus('TL がまだ未設定 — 一度クリックしてから BR へ', 'warn'); return; }
  refinedBR = null;
  mode = 'refine-br';
  setStatus(`📍 ${pendingBand.row}-${pad(pendingBand.end)} の BR をクリック (再クリックで上書き)`, 'wait');
  renderAll();
});

document.getElementById('refine-commit').addEventListener('click', () => {
  if (!pendingBand || !refinedTL || !refinedBR) {
    setStatus('TL / BR どちらか未設定', 'warn'); return;
  }
  commitBand(refinedTL, refinedBR);
  mode = 'idle';
  refinedTL = null; refinedBR = null; pendingBand = null;
  setStatus('✓ 帯 commit', 'idle');
  renderAll();
});

overlay.addEventListener('click', (e) => {
  if (mode === 'idle') return;
  const rect = overlay.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width) * 100;
  const y = ((e.clientY - rect.top) / rect.height) * 100;
  if (mode === 'waiting1') {
    pendingCorner1 = { x, y };
    mode = 'waiting2';
    setStatus(`✦ ${pendingBand.row}-${pad(pendingBand.end)} の右下 (= 最後) をクリックしてください`, 'wait');
    renderAll();
  } else if (mode === 'waiting2') {
    const c2 = { x, y };
    commitBand(pendingCorner1, c2);
    mode = 'idle';
    pendingCorner1 = null;
    setStatus('✓ 帯追加。次の帯を定義するには上から設定して "クリック開始"', 'idle');
    renderAll();
  } else if (mode === 'refine-tl') {
    refinedTL = { x, y };
    setStatus(`📍 TL = (${x.toFixed(2)}, ${y.toFixed(2)}) — 再クリックで上書き / BR へ進むには "BR refine 開始"`, 'wait');
    renderAll();
  } else if (mode === 'refine-br') {
    refinedBR = { x, y };
    setStatus(`📍 BR = (${x.toFixed(2)}, ${y.toFixed(2)}) — 再クリックで上書き / "band を commit" で確定`, 'wait');
    renderAll();
  }
});

function commitBand(c1, c2) {
  const { row, start, end, dir } = pendingBand;
  // Normalise to top-left + bottom-right
  const xMin = Math.min(c1.x, c2.x), xMax = Math.max(c1.x, c2.x);
  const yMin = Math.min(c1.y, c2.y), yMax = Math.max(c1.y, c2.y);
  const n = end - start + 1;
  // For dir=lr: first cell at xMin, last cell at xMax. cell_w = (xMax - xMin) / n? No —
  // c1 should be TL of first cell, c2 BR of last cell, so width spans n cells.
  // Cell width = (total width) / n, cell height = full height.
  const cells = [];
  for (let i = 0; i < n; i++) {
    let cell;
    if (dir === 'lr') {
      const w = (xMax - xMin) / n;
      cell = { x: xMin + i * w, y: yMin, w: w, h: yMax - yMin };
    } else if (dir === 'rl') {
      const w = (xMax - xMin) / n;
      cell = { x: xMax - (i + 1) * w, y: yMin, w: w, h: yMax - yMin };
    } else if (dir === 'tb') {
      const h = (yMax - yMin) / n;
      cell = { x: xMin, y: yMin + i * h, w: xMax - xMin, h };
    } else if (dir === 'bt') {
      const h = (yMax - yMin) / n;
      cell = { x: xMin, y: yMax - (i + 1) * h, w: xMax - xMin, h };
    }
    const num = start + i;
    const id = `${row}-${pad(num)}`;
    cells.push({ id, ...cell });
  }
  // Record band metadata + write coords
  const key = `${row}-${pad(start)}..${pad(end)}-${dir}`;
  // Remove existing band with same key (replace)
  state.bands = state.bands.filter(b => b.key !== key);
  state.bands.push({ key, row, start, end, dir, c1, c2, n });
  for (const c of cells) {
    state.coords[c.id] = { x: round(c.x), y: round(c.y), w: round(c.w), h: round(c.h) };
  }
  saveState();
}

function deleteBand(key) {
  const band = state.bands.find(b => b.key === key);
  if (!band) return;
  // Remove all coords this band created
  for (let i = 0; i < band.n; i++) {
    const id = `${band.row}-${pad(band.start + i)}`;
    delete state.coords[id];
  }
  state.bands = state.bands.filter(b => b.key !== key);
  saveState();
  renderAll();
}

function setStatus(text, kind) {
  statusEl.textContent = text;
  statusEl.className = 'status ' + (kind === 'idle' ? 'idle' : '');
}

function drawCrosshair(c, color) {
  const ns = 'http://www.w3.org/2000/svg';
  // Small + crosshair (0.5 viewBox units = 0.5% of map). The stroke is
  // non-scaling so it stays at pixel-thin even when the map is zoomed.
  const half = 0.35;
  const g = document.createElementNS(ns, 'g');
  g.setAttribute('stroke', color);
  g.setAttribute('stroke-width', '0.5');
  g.setAttribute('vector-effect', 'non-scaling-stroke');
  g.setAttribute('pointer-events', 'none');
  const h = document.createElementNS(ns, 'line');
  h.setAttribute('x1', c.x - half); h.setAttribute('y1', c.y);
  h.setAttribute('x2', c.x + half); h.setAttribute('y2', c.y);
  g.appendChild(h);
  const v = document.createElementNS(ns, 'line');
  v.setAttribute('x1', c.x); v.setAttribute('y1', c.y - half);
  v.setAttribute('x2', c.x); v.setAttribute('y2', c.y + half);
  g.appendChild(v);
  overlay.appendChild(g);
}

function renderAll() {
  // Wipe overlay
  while (overlay.firstChild) overlay.removeChild(overlay.firstChild);
  const ns = 'http://www.w3.org/2000/svg';

  // --- Upstream coords from coords.js — draw FIRST so local edits paint on top ---
  if (showUpstream) {
    for (const [id, c] of Object.entries(upstreamCoords)) {
      // Skip if user already overwrote in local state (avoid double-render)
      if (state.coords[id]) continue;
      const r = document.createElementNS(ns, 'rect');
      r.setAttribute('x', c.x); r.setAttribute('y', c.y);
      r.setAttribute('width', c.w); r.setAttribute('height', c.h);
      r.setAttribute('class', 'upstream');
      overlay.appendChild(r);
      const fs = Math.min(c.h * 0.5, (c.w / id.length) * 1.3);
      if (fs >= 0.4) {
        const t = document.createElementNS(ns, 'text');
        t.setAttribute('x', c.x + c.w / 2);
        t.setAttribute('y', c.y + c.h / 2);
        t.setAttribute('text-anchor', 'middle');
        t.setAttribute('dominant-baseline', 'central');
        t.setAttribute('font-size', fs);
        t.setAttribute('class', 'upstream-label');
        t.textContent = id;
        overlay.appendChild(t);
      }
    }
  }

  // Draw every local coord as placed rect + label
  const known = new Set((window.BOOTHS || []).map(b => b.booth_id));
  for (const [id, c] of Object.entries(state.coords)) {
    const r = document.createElementNS(ns, 'rect');
    r.setAttribute('x', c.x); r.setAttribute('y', c.y);
    r.setAttribute('width', c.w); r.setAttribute('height', c.h);
    r.setAttribute('class', known.has(id) ? 'placed' : 'placed');
    if (!known.has(id)) r.style.opacity = '0.4';
    overlay.appendChild(r);
    // Adaptive font: scale label to cell dims so it never overflows.
    // Skip entirely if the cell is too small to hold even 3 chars.
    // viewBox is 0-100; font-size is in those units.
    const fs = Math.min(c.h * 0.55, (c.w / id.length) * 1.4);
    if (fs >= 0.4) {
      const t = document.createElementNS(ns, 'text');
      t.setAttribute('x', c.x + c.w / 2);
      t.setAttribute('y', c.y + c.h / 2);
      t.setAttribute('text-anchor', 'middle');
      t.setAttribute('dominant-baseline', 'central');
      t.setAttribute('font-size', fs);
      t.setAttribute('class', 'placed-label');
      t.textContent = id;
      overlay.appendChild(t);
    }
  }
  // Bands list
  bandsListEl.innerHTML = '';
  for (const b of state.bands) {
    const div = document.createElement('div');
    div.className = 'band';
    div.innerHTML = `<span>${b.row}-${pad(b.start)} .. ${b.row}-${pad(b.end)} (${b.dir}, ${b.n})</span>`;
    const btn = document.createElement('button');
    btn.textContent = '✕'; btn.title = '削除';
    btn.addEventListener('click', () => deleteBand(b.key));
    div.appendChild(btn);
    bandsListEl.appendChild(div);
  }
  // Draw pending alternate-mode TL corner marker (small +)
  if (pendingCorner1) drawCrosshair(pendingCorner1, '#c00');
  // Refinement mode pending markers
  if (refinedTL) drawCrosshair(refinedTL, '#1565c0');
  if (refinedBR) drawCrosshair(refinedBR, '#c62828');
  bandCountEl.textContent = state.bands.length;
  coordCountEl.textContent = Object.keys(state.coords).length;
  // JSON output
  const sorted = {};
  Object.keys(state.coords).sort((a, b) => a.localeCompare(b, 'en', { numeric: true })).forEach(k => sorted[k] = state.coords[k]);
  const body = `/**\n * Auto-generated by coord-tool.html — DO NOT hand-edit without re-importing\n * into the tool (paste into the "Export" textarea, then continue).\n */\nwindow.BOOTH_COORDS = ${JSON.stringify(sorted, null, 2)};\n`;
  jsonOut.value = body;
}

document.getElementById('copy-json').addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(jsonOut.value);
    setStatus('✓ クリップボードにコピーした、coords.js に貼り付けて commit', 'idle');
  } catch (e) {
    jsonOut.select(); document.execCommand('copy');
    setStatus('✓ コピー (fallback)', 'idle');
  }
});

document.getElementById('dl-json').addEventListener('click', () => {
  const blob = new Blob([jsonOut.value], { type: 'text/javascript' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'coords.js';
  a.click();
  URL.revokeObjectURL(a.href);
});

document.getElementById('reset').addEventListener('click', () => {
  if (!confirm('全 coords + 全 band を消去します。よろしいですか?')) return;
  state = { coords: {}, bands: [] };
  saveState();
  renderAll();
});

function pad(n) { return String(n).padStart(2, '0'); }
function round(v) { return Math.round(v * 100) / 100; }

// === Zoom ===
// .map-inner has width: <zoom * 100>% so the image (width:100% of its
// parent) and the SVG overlay (inset:0) both scale together. The
// surrounding .map-wrap has overflow:auto so scroll bars appear when
// zoomed in. Click→viewBox coord math is unaffected: we already
// divide by overlay.getBoundingClientRect().width which already
// reflects the scaled width.
let zoom = 1;
const mapInner = document.getElementById('map-inner');
const mapWrap = document.getElementById('map-wrap');
const zoomDisplay = document.getElementById('zoom-display');

function setZoom(z, anchor) {
  const prev = zoom;
  zoom = Math.max(0.25, Math.min(8, z));
  mapInner.style.width = (zoom * 100) + '%';
  zoomDisplay.textContent = Math.round(zoom * 100) + '%';
  // If anchor (page coords) provided, scroll so that the same image point
  // stays under the cursor — natural zoom-at-cursor feel.
  if (anchor && prev !== zoom) {
    const wrapRect = mapWrap.getBoundingClientRect();
    const cursorOffsetX = anchor.x - wrapRect.left + mapWrap.scrollLeft;
    const cursorOffsetY = anchor.y - wrapRect.top + mapWrap.scrollTop;
    const ratio = zoom / prev;
    mapWrap.scrollLeft = cursorOffsetX * ratio - (anchor.x - wrapRect.left);
    mapWrap.scrollTop = cursorOffsetY * ratio - (anchor.y - wrapRect.top);
  }
}

document.getElementById('zoom-in').addEventListener('click', () => setZoom(zoom * 1.4));
document.getElementById('zoom-out').addEventListener('click', () => setZoom(zoom / 1.4));
document.getElementById('zoom-fit').addEventListener('click', () => { setZoom(1); mapWrap.scrollTo(0, 0); });

// Ctrl/Cmd + wheel → zoom at cursor. Plain wheel is normal scroll.
mapWrap.addEventListener('wheel', (e) => {
  if (!e.ctrlKey && !e.metaKey) return;
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.18 : 1 / 1.18;
  setZoom(zoom * factor, { x: e.clientX, y: e.clientY });
}, { passive: false });

// Pinch-to-zoom for touch devices. We track two-finger gestures via
// pointer events and update zoom by the change in finger distance.
const activePointers = new Map();
let pinchStartDist = 0;
let pinchStartZoom = 1;
let pinchCenter = null;
mapWrap.addEventListener('pointerdown', (e) => {
  if (e.pointerType !== 'touch') return;
  activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (activePointers.size === 2) {
    const pts = [...activePointers.values()];
    pinchStartDist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
    pinchStartZoom = zoom;
    pinchCenter = { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 };
  }
});
mapWrap.addEventListener('pointermove', (e) => {
  if (!activePointers.has(e.pointerId)) return;
  activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (activePointers.size === 2 && pinchStartDist > 0) {
    const pts = [...activePointers.values()];
    const d = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
    setZoom(pinchStartZoom * (d / pinchStartDist), pinchCenter);
    e.preventDefault();
  }
}, { passive: false });
function clearPointer(e) {
  activePointers.delete(e.pointerId);
  if (activePointers.size < 2) { pinchStartDist = 0; pinchCenter = null; }
}
mapWrap.addEventListener('pointerup', clearPointer);
mapWrap.addEventListener('pointercancel', clearPointer);
mapWrap.addEventListener('pointerleave', clearPointer);

// Upstream-display toggle
document.getElementById('show-upstream').addEventListener('change', (e) => {
  showUpstream = e.target.checked;
  renderAll();
});

init();
</script>
</body>
</html>
